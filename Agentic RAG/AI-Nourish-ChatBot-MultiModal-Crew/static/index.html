<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NourishBot — photo in, plan out</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar__mark">NourishBot</div>
  <div class="topbar__tag">a photo of food, turned into something useful</div>
</header>

<main class="layout">

  <!-- ===== Console (inputs) ===== -->
  <section class="console" aria-label="Analyze a photo">

    <div class="console__block">
      <span class="console__label">01 — mode</span>
      <div class="toggle" role="radiogroup" aria-label="Workflow type">
        <button type="button" class="toggle__option is-active" data-mode="recipe" role="radio" aria-checked="true">
          <span class="toggle__title">Recipes</span>
          <span class="toggle__hint">fridge or pantry photo → dishes you can cook</span>
        </button>
        <button type="button" class="toggle__option" data-mode="analysis" role="radio" aria-checked="false">
          <span class="toggle__title">Analysis</span>
          <span class="toggle__hint">a finished plate → nutrition breakdown</span>
        </button>
      </div>
    </div>

    <div class="console__block">
      <span class="console__label">02 — photo</span>
      <label class="dropzone" for="image-input" id="dropzone">
        <img id="preview-img" class="dropzone__preview" alt="" hidden />
        <div id="dropzone-empty" class="dropzone__empty">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 16.5V6.5C4 5.4 4.9 4.5 6 4.5H18C19.1 4.5 20 5.4 20 6.5V16.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M4 16.5L8.5 12.5C9.2 11.9 10.2 11.9 10.9 12.5L14 15" stroke="currentColor" stroke-width="1.4"/>
            <path d="M13 14L15 12.2C15.7 11.6 16.7 11.6 17.4 12.2L20 14.5" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="9" cy="9" r="1.3" fill="currentColor"/>
            <path d="M2.5 19.5H21.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <p><strong>Click to upload</strong> or drag a photo here</p>
          <p class="dropzone__meta">JPEG, PNG or WEBP, up to 10MB</p>
        </div>
      </label>
      <input type="file" id="image-input" accept="image/jpeg,image/png,image/webp" hidden />
    </div>

    <div class="console__block" id="dietary-block">
      <span class="console__label">03 — dietary restrictions</span>
      <input type="text" id="dietary-input" class="text-input" placeholder="e.g. vegan, keto, nut-free — optional" />
    </div>

    <button type="button" id="analyze-btn" class="analyze-btn" disabled>
      <span id="analyze-btn-label">Upload a photo to begin</span>
    </button>

    <p id="error-msg" class="error-msg" role="alert" hidden></p>
  </section>

  <!-- ===== Results ===== -->
  <section class="results" aria-label="Results" aria-live="polite">

    <div id="state-empty" class="state-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="12" cy="12" r="3.4" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <p>Nothing plated yet</p>
      <p class="state-empty__sub">Choose a mode, add a photo, and select Analyze.</p>
    </div>

    <div id="state-loading" class="state-loading" hidden>
      <div class="spinner" aria-hidden="true"></div>
      <p id="loading-label">Reading the photo…</p>
    </div>

    <div id="state-error" class="state-error" hidden>
      <p class="state-error__title">The workflow didn't complete</p>
      <p id="state-error-detail" class="state-error__detail"></p>
    </div>

    <div id="state-results" hidden></div>

  </section>

</main>

<footer class="footer">
  <span>NourishBot</span>
  <span class="footer__dot">·</span>
  <span>results are estimates, not medical advice</span>
</footer>

<script src="/static/script.js"></script>
</body>
</html>
